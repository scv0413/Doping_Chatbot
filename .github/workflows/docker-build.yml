name: Docker Build Verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run ruff check app tests scripts

      - name: Test
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t doping-chatbot-api:ci .

      - name: Run Docker container
        run: |
          docker run -d \
            --name doping-chatbot-api-ci \
            -p 8000:8000 \
            -e APP_ENV=ci \
            doping-chatbot-api:ci

      - name: Check container user
        run: |
          test "$(docker exec doping-chatbot-api-ci id -u)" != "0"

      - name: Check API health and readiness shape
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          def get_json(url: str) -> dict:
              with urllib.request.urlopen(url, timeout=2) as response:
                  return json.loads(response.read().decode("utf-8"))

          for _ in range(30):
              try:
                  health = get_json("http://127.0.0.1:8000/health")
                  ready = get_json("http://127.0.0.1:8000/ready")
                  assert health["status"] == "ok"
                  assert ready["status"] in {"ready", "not_ready"}
                  assert isinstance(ready.get("checks"), list)
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("API did not expose health/readiness JSON")
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker logs doping-chatbot-api-ci || true

      - name: Stop Docker container
        if: always()
        run: docker rm -f doping-chatbot-api-ci || true

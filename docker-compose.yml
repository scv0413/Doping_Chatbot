services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: doping-chatbot-api:local
    container_name: doping-chatbot-api
    env_file:
      - .env
    environment:
      APP_ENV: docker
      RAW_DATA_DIR: /app/data/raw
      PROCESSED_DATA_DIR: /app/data/processed
      INDEX_DIR: /app/data/indexes
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - --no-sync
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
